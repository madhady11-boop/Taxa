<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast Taxi 100 - تطبيق الزبون</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #FF6B00;
            --dark: #0A0E27;
            --success: #00D97E;
            --text: #1A1D2E;
            --text-light: #8B92A8;
            --bg: #F8F9FC;
            --border: #E8ECF4;
        }
        body {
            font-family: 'Cairo', sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        /* Phone Frame */
        .phone-frame {
            width: 390px;
            height: 844px;
            background: white;
            border-radius: 50px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5), 0 0 0 12px #1a1a1a, 0 0 0 14px #333;
        }
        .phone-notch {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 130px;
            height: 32px;
            background: #000;
            border-radius: 20px;
            z-index: 1000;
        }
        .status-bar {
            padding: 15px 30px 8px;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: 700;
            padding-top: 55px;
            background: white;
            position: relative;
            z-index: 100;
        }
        .app-screen {
            height: 100%;
            overflow: hidden;
            position: relative;
        }
        
        /* Map Container */
        #customerMap {
            height: 100%;
            width: 100%;
        }
        
        /* Top Bar */
        .top-bar {
            position: absolute;
            top: 60px;
            left: 15px;
            right: 15px;
            z-index: 500;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .menu-btn, .notif-btn {
            width: 45px; height: 45px;
            background: white;
            border-radius: 15px;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: var(--dark);
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            cursor: pointer;
            position: relative;
        }
        .notif-btn::after {
            content: '';
            position: absolute;
            top: 10px; left: 10px;
            width: 10px; height: 10px;
            background: var(--primary);
            border-radius: 50%;
            border: 2px solid white;
        }
        
        /* Location Button */
        .location-btn {
            position: absolute;
            bottom: 340px;
            left: 15px;
            width: 50px; height: 50px;
            background: white;
            border-radius: 15px;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: var(--primary);
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            cursor: pointer;
            z-index: 500;
        }
        
        /* Bottom Sheet */
        .bottom-sheet {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-radius: 30px 30px 0 0;
            padding: 20px;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.15);
            z-index: 500;
            max-height: 350px;
        }
        .sheet-handle {
            width: 40px; height: 4px;
            background: #ddd;
            border-radius: 2px;
            margin: 0 auto 20px;
        }
        .greeting {
            font-size: 20px;
            font-weight: 900;
            margin-bottom: 5px;
        }
        .greeting-sub {
            font-size: 13px;
            color: var(--text-light);
            margin-bottom: 20px;
        }
        
        /* Search */
        .search-input {
            width: 100%;
            padding: 15px 20px 15px 50px;
            border: 2px solid var(--border);
            border-radius: 15px;
            font-family: inherit;
            font-size: 15px;
            background: var(--bg);
            margin-bottom: 15px;
            transition: all 0.3s;
        }
        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
        }
        .search-wrapper {
            position: relative;
        }
        .search-wrapper i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary);
            font-size: 18px;
        }
        
        /* Quick Actions */
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }
        .quick-btn {
            background: var(--bg);
            border: none;
            padding: 12px 8px;
            border-radius: 15px;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s;
            font-family: inherit;
        }
        .quick-btn:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-3px);
        }
        .quick-btn i {
            font-size: 20px;
            margin-bottom: 5px;
            display: block;
            color: var(--primary);
        }
        .quick-btn:hover i { color: white; }
        .quick-btn span {
            font-size: 11px;
            font-weight: 700;
        }
        
        /* Saved Places */
        .saved-place {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .saved-place:hover { background: var(--bg); }
        .place-icon {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, var(--primary), #FF8E3C);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .place-info { flex: 1; }
        .place-name { font-weight: 700; font-size: 14px; }
        .place-address { font-size: 12px; color: var(--text-light); }
        
        /* Custom Markers */
        .my-location-marker {
            width: 20px; height: 20px;
            background: var(--primary);
            border: 4px solid white;
            border-radius: 50%;
            box-shadow: 0 0 0 8px rgba(255,107,0,0.3);
            animation: locationPulse 2s infinite;
        }
        @keyframes locationPulse {
            0%, 100% { box-shadow: 0 0 0 8px rgba(255,107,0,0.3); }
            50% { box-shadow: 0 0 0 15px rgba(255,107,0,0.1); }
        }
        .driver-icon-map {
            background: var(--dark);
            width: 32px; height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            border: 3px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="phone-notch"></div>
        <div class="app-screen">
            <!-- Status Bar -->
            <div class="status-bar" style="position: absolute; top: 0; left: 0; right: 0; background: transparent; z-index: 600;">
                <span>9:41</span>
                <span><i class="fas fa-signal"></i> <i class="fas fa-wifi"></i> <i class="fas fa-battery-full"></i></span>
            </div>
            
            <!-- Map -->
            <div id="customerMap"></div>
            
            <!-- Top Bar -->
            <div class="top-bar">
                <button class="menu-btn"><i class="fas fa-bars"></i></button>
                <button class="notif-btn"><i class="fas fa-bell"></i></button>
            </div>
            
            <!-- Location Button -->
            <button class="location-btn"><i class="fas fa-crosshairs"></i></button>
            
            <!-- Bottom Sheet -->
            <div class="bottom-sheet">
                <div class="sheet-handle"></div>
                <div class="greeting">مرحباً محمد 👋</div>
                <div class="greeting-sub">وين تحب تروح اليوم؟</div>
                
                <div class="search-wrapper">
                    <i class="fas fa-search"></i>
                    <input type="text" class="search-input" placeholder="ابحث عن وجهتك...">
                </div>
                
                <div class="quick-actions">
                    <button class="quick-btn"><i class="fas fa-home"></i><span>البيت</span></button>
                    <button class="quick-btn"><i class="fas fa-briefcase"></i><span>الشغل</span></button>
                    <button class="quick-btn"><i class="fas fa-heart"></i><span>مفضلة</span></button>
                    <button class="quick-btn"><i class="fas fa-history"></i><span>سابقة</span></button>
                </div>
                
                <div class="saved-place">
                    <div class="place-icon"><i class="fas fa-map-marker-alt"></i></div>
                    <div class="place-info">
                        <div class="place-name">شارع بغداد</div>
                        <div class="place-address">الناصرية - 2.5 كم</div>
                    </div>
                    <i class="fas fa-chevron-left" style="color:#ccc"></i>
                </div>
                
                <div class="saved-place">
                    <div class="place-icon" style="background: linear-gradient(135deg, #2E5BFF, #5B7FFF)"><i class="fas fa-university"></i></div>
                    <div class="place-info">
                        <div class="place-name">جامعة العين</div>
                        <div class="place-address">الناصرية - 4.2 كم</div>
                    </div>
                    <i class="fas fa-chevron-left" style="color:#ccc"></i>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const map = L.map('customerMap', {
            zoomControl: false,
            attributionControl: false
        }).setView([31.0561, 46.2575], 15);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        // موقع المستخدم
        L.marker([31.0561, 46.2575], {
            icon: L.divIcon({
                className: '',
                html: '<div class="my-location-marker"></div>',
                iconSize: [20, 20],
                iconAnchor: [10, 10]
            })
        }).addTo(map).bindPopup('موقعك الحالي');
        
        // الكباتن القريبين
        const nearbyDrivers = [
            [31.0580, 46.2560],
            [31.0540, 46.2590],
            [31.0570, 46.2600],
            [31.0555, 46.2540]
        ];
        
        nearbyDrivers.forEach(coords => {
            L.marker(coords, {
                icon: L.divIcon({
                    className: '',
                    html: '<div class="driver-icon-map">🏍️</div>',
                    iconSize: [32, 32],
                    iconAnchor: [16, 16]
                })
            }).addTo(map);
        });
    </script>
</body>
</html>
