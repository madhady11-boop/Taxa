<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast Taxi 100 - نظام إدارة التاكسي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0A0E27 0%, #1E2749 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
            position: relative;
        }
        body::before {
            content: '';
            position: absolute;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(255,107,0,0.3) 0%, transparent 70%);
            top: -100px; right: -100px;
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }
        body::after {
            content: '';
            position: absolute;
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(255,214,10,0.2) 0%, transparent 70%);
            bottom: -100px; left: -100px;
            border-radius: 50%;
            animation: float 8s ease-in-out infinite reverse;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-30px); }
        }
        .container {
            text-align: center;
            z-index: 10;
            padding: 40px;
        }
        .logo {
            font-size: 80px;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        h1 {
            font-size: 48px;
            font-weight: 900;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #FF6B00, #FFD60A);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            font-size: 20px;
            opacity: 0.8;
            margin-bottom: 60px;
        }
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            max-width: 1000px;
            margin: 0 auto;
        }
        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 40px 30px;
            text-decoration: none;
            color: white;
            transition: all 0.4s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, #FF6B00, #FFD60A);
            transform: scaleX(0);
            transition: transform 0.4s ease;
        }
        .card:hover {
            transform: translateY(-10px);
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,107,0,0.5);
            box-shadow: 0 20px 60px rgba(255,107,0,0.3);
        }
        .card:hover::before { transform: scaleX(1); }
        .card-icon {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, #FF6B00, #FF8E3C);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin: 0 auto 20px;
            box-shadow: 0 10px 30px rgba(255,107,0,0.4);
        }
        .card h3 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        .card p {
            opacity: 0.7;
            font-size: 15px;
            line-height: 1.6;
        }
        .card-badge {
            position: absolute;
            top: 15px; left: 15px;
            background: #00D97E;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
        }
        .footer {
            margin-top: 60px;
            opacity: 0.6;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🏍️</div>
        <h1>Fast Taxi 100</h1>
        <p class="subtitle">منصة إدارة التاكسي الأولى في الناصرية</p>
        
        <div class="cards">
            <a href="admin.html" class="card">
                <span class="card-badge">الأهم</span>
                <div class="card-icon"><i class="fas fa-chart-line"></i></div>
                <h3>لوحة المدير</h3>
                <p>إدارة كاملة للنظام مع خرائط حية وتقارير تفصيلية</p>
            </a>
            
            <a href="customer.html" class="card">
                <div class="card-icon"><i class="fas fa-user"></i></div>
                <h3>تطبيق الزبون</h3>
                <p>اطلب دراجتك بضغطة زر ووصل بسرعة وأمان</p>
            </a>
            
            <a href="driver.html" class="card">
                <div class="card-icon"><i class="fas fa-motorcycle"></i></div>
                <h3>تطبيق الكابتن</h3>
                <p>استقبل الطلبات وزد أرباحك اليومية</p>
            </a>
        </div>
        
        <p class="footer">© 2025 Fast Taxi 100 - جميع الحقوق محفوظة</p>
    </div>
</body>
</html>
